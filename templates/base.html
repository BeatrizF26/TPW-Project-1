<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookMarket - Compra e Venda de Livros</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #2ec4b6;
        --secondary: #ff6b6b;
        --dark: #1a1a1a;
        --light: #f8f9fa;
        --grey: #e9ecef;
        --text: #2c3e50;
        --border: #dee2e6;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--light);
        color: var(--text);
        line-height: 1.6;
      }

      /* Navigation Bar */
      nav {
        background: white;
        padding: 1rem 2rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        position: sticky;
        top: 0;
        z-index: 100;
        border-bottom: 2px solid var(--primary);
      }

      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .nav-brand {
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--primary);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .nav-brand:hover {
        color: var(--secondary);
      }

      .nav-links {
        display: flex;
        gap: 2rem;
        align-items: center;
      }

      .nav-links a {
        color: var(--text);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s ease;
        border-radius: 6px;
        padding: 0.5rem 1rem;
      }

      .nav-links a:hover {
        color: var(--primary);
        background-color: rgba(46, 196, 182, 0.1);
      }

      .nav-links .btn-logout {
        background-color: var(--secondary);
        color: white;
      }

      .nav-links .btn-logout:hover {
        background-color: #ff5252;
        color: white;
      }

      .nav-links .btn-primary {
        background-color: var(--primary);
        color: white;
      }

      .nav-links .btn-primary:hover {
        background-color: #26a89e;
        color: white;
      }

      /* Container */
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 3rem 2rem;
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.8rem 1.5rem;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.3s ease;
      }

      .btn-add {
        background-color: var(--primary);
        color: white;
        margin-bottom: 2rem;
      }

      .btn-add:hover {
        background-color: #26a89e;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(46, 196, 182, 0.3);
      }

      /* Headings */
      h1 {
        font-size: 2.5rem;
        margin-bottom: 2rem;
        color: var(--dark);
        font-weight: 700;
      }

      h2 {
        font-size: 2rem;
        margin-bottom: 1.5rem;
        color: var(--dark);
      }

      h3 {
        font-size: 1.3rem;
        color: var(--text);
        margin-bottom: 0.5rem;
      }

      /* Grid Layout */
      .books-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 2rem;
        margin-top: 2rem;
      }

      /* Book Card */
      .book {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        transition: all 0.3s ease;
        cursor: pointer;
        display: flex;
        flex-direction: column;
      }

      .book:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      }

      .book-image {
        width: 100%;
        height: 200px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        color: white;
      }

      .book-content {
        padding: 1.5rem;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
      }

      .book-title {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--dark);
        margin-bottom: 0.5rem;
        line-height: 1.4;
      }

      .book-author {
        color: #7f8c8d;
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }

      .book-price {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary);
        margin-top: auto;
      }

      .book-price::after {
        content: "€";
      }

      /* Empty State */
      .empty-state {
        text-align: center;
        padding: 4rem 2rem;
      }

      .empty-state-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
      }

      .empty-state p {
        font-size: 1.2rem;
        color: #7f8c8d;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .books-grid {
          grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
          gap: 1.5rem;
        }

        h1 {
          font-size: 1.8rem;
        }

        nav {
          flex-direction: column;
          gap: 1rem;
          padding: 1rem;
        }

        .nav-links {
          width: 100%;
          flex-wrap: wrap;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/" class="nav-brand">📚 BookMarket</a>
      <div class="nav-links">
        {% if user.is_authenticated %}

        <a href="{% url 'inbox' %}" style="display: flex; align-items: center; gap: 5px;">
          Messages
        </a>

        <a
          href="/accounts/profile/"
          style="color: var(--text); font-weight: 500; text-decoration: none"
          >Olá, <strong>{{ user.username }}</strong></a
        >
        <form method="post" action="/accounts/logout/" style="display: inline">
          {% csrf_token %}
          <button
            type="submit"
            class="btn-logout"
            style="
              background: none;
              border: none;
              color: inherit;
              cursor: pointer;
            "
          >
            Sair
          </button>
        </form>
        {% else %}
        <a href="/accounts/login/">Entrar</a>
        <a href="/accounts/register/" class="btn-primary">Registar</a>
        {% endif %}
      </div>
    </nav>

    <div class="container">{% block content %}{% endblock %}</div>
  </body>
</html>
